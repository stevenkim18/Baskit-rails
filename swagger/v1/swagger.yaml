---
openapi: 3.0.1
info:
  title: API V1
  version: v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  "/api/v1/auth/email/register":
    post:
      summary: Register with email
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
                display_name:
                  type: string
                  nullable: true
              required:
              - email
              - password
              - password_confirmation
  "/api/v1/auth/email/login":
    post:
      summary: Login with email
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: ok
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                device_name:
                  type: string
                  nullable: true
              required:
              - email
              - password
  "/api/v1/auth/refresh":
    post:
      summary: Refresh access token
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: ok
        '401':
          description: invalid refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                device_name:
                  type: string
                  nullable: true
              required:
              - refresh_token
  "/api/v1/auth/session":
    delete:
      summary: Logout
      tags:
      - Auth
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '204':
          description: no content
        '401':
          description: unauthorized
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
